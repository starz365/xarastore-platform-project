apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: xarastore-production
commonLabels:
  environment: production
  tier: production
patchesStrategicMerge:
  - deployment-patch.yaml
  - hpa-patch.yaml
resources:
  - ../../base
images:
  - name: xarastore
    newName: ghcr.io/xarastore/xarastore-app
    newTag: production
configMapGenerator:
  - name: xarastore-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - LOG_LEVEL=warn
      - SENTRY_ENVIRONMENT=production
secretGenerator:
  - name: xarastore-secrets
    behavior: replace
    envs:
      - .env.production
