apiVersion: apps/v1
kind: Deployment
metadata:
  name: xarastore-app
  labels:
    app: xarastore
    component: frontend
    tier: web
spec:
  replicas: 3
  minReadySeconds: 30
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: xarastore
      component: frontend
      tier: web
  template:
    metadata:
      labels:
        app: xarastore
        component: frontend
        tier: web
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 2000
      containers:
      - name: app
        image: xarastore:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: HOSTNAME
          value: "0.0.0.0"
        - name: NEXT_PUBLIC_SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: xarastore-secrets
              key: supabase-url
        - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
          valueFrom:
            secretKeyRef:
              name: xarastore-secrets
              key: supabase-anon-key
        - name: SUPABASE_SERVICE_ROLE_KEY
          valueFrom:
            secretKeyRef:
              name: xarastore-secrets
              key: supabase-service-role-key
        - name: MPESA_CONSUMER_KEY
          valueFrom:
            secretKeyRef:
              name: xarastore-secrets
              key: mpesa-consumer-key
        - name: MPESA_CONSUMER_SECRET
          valueFrom:
            secretKeyRef:
              name: xarastore-secrets
              key: mpesa-consumer-secret
        - name: MPESA_SHORT_CODE
          valueFrom:
            secretKeyRef:
              name: xarastore-secrets
              key: mpesa-short-code
        - name: MPESA_PASSKEY
          valueFrom:
            secretKeyRef:
              name: xarastore-secrets
              key: mpesa-passkey
        - name: REDIS_URL
          value: "redis://xarastore-redis-master:6379"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: xarastore-secrets
              key: database-url
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /api/health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 30
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: secrets-volume
          mountPath: /app/secrets
          readOnly: true
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: secrets-volume
        secret:
          secretName: xarastore-secrets
          optional: false
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - xarastore
              topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 60
