apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xarastore-ingress
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: "internet-facing"
    alb.ingress.kubernetes.io/target-type: "ip"
    alb.ingress.kubernetes.io/ssl-policy: "ELBSecurityPolicy-TLS13-1-2-2021-06"
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:af-south-1:ACCOUNT_ID:certificate/CERT_ID"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}, {"HTTP":80}]'
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": { "Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
    alb.ingress.kubernetes.io/healthcheck-path: "/api/health"
    alb.ingress.kubernetes.io/healthcheck-protocol: "HTTP"
    alb.ingress.kubernetes.io/healthcheck-port: "traffic-port"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "10"
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "2"
    alb.ingress.kubernetes.io/wafv2-acl-arn: "arn:aws:wafv2:af-south-1:ACCOUNT_ID:regional/webacl/XarastoreWebACL/ID"
    alb.ingress.kubernetes.io/load-balancer-attributes: "routing.http2.enabled=true"
spec:
  rules:
  - host: "xarastore.com"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: xarastore-service
            port:
              number: 80
  - host: "www.xarastore.com"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: xarastore-service
            port:
              number: 80
  tls:
  - hosts:
    - xarastore.com
    - www.xarastore.com
    secretName: xarastore-tls
