xarastore/.github/workflows/cd.yml
name: Continuous Deployment

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Docker image tag'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.0.0'

      - name: Configure Kubernetes
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to staging
        run: |
          cd kubernetes/overlays/staging
          kustomize edit set image ghcr.io/xarastore/xarastore-app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          kubectl apply -k . --namespace=xarastore-staging

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/xarastore-app-staging --namespace=xarastore-staging --timeout=300s

      - name: Run smoke tests
        run: |
          STAGING_URL=$(kubectl get ingress xarastore-ingress-staging -n xarastore-staging -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl -f https://$STAGING_URL/api/health || exit 1

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          author_name: GitHub Actions
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-staging
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}.{{patch}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.0.0'

      - name: Configure Kubernetes
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to production
        run: |
          cd kubernetes/overlays/production
          kustomize edit set image ghcr.io/xarastore/xarastore-app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          kubectl apply -k . --namespace=xarastore-production

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/xarastore-app --namespace=xarastore-production --timeout=300s

      - name: Run canary deployment
        run: |
          # Deploy canary version
          kubectl apply -f kubernetes/canary.yaml --namespace=xarastore-production
          sleep 60  # Monitor canary for 1 minute
          
          # Check canary health
          CANARY_HEALTH=$(kubectl get pods -l app=xarastore,version=canary -n xarastore-production -o jsonpath='{.items[*].status.conditions[?(@.type=="Ready")].status}')
          
          if [[ "$CANARY_HEALTH" == "True" ]]; then
            echo "✅ Canary deployment healthy"
            # Promote canary to full deployment
            kubectl scale deployment xarastore-app --replicas=4 --namespace=xarastore-production
            kubectl delete deployment xarastore-app-canary --namespace=xarastore-production
          else
            echo "❌ Canary deployment unhealthy - rolling back"
            kubectl rollout undo deployment/xarastore-app --namespace=xarastore-production
            exit 1
          fi

      - name: Verify deployment
        run: |
          PRODUCTION_URL="https://xarastore.com"
          curl -f $PRODUCTION_URL/api/health || exit 1
          
          # Run critical path tests
          npm run test:critical -- --url=$PRODUCTION_URL

      - name: Invalidate CDN cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          author_name: GitHub Actions
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          generate_release_notes: true
          files: |
            ./build-artifacts/*

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure()
    needs: [deploy-staging, deploy-production]
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Rollback staging
        if: needs.deploy-staging.result == 'failure'
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" > $HOME/.kube/config
          kubectl rollout undo deployment/xarastore-app-staging --namespace=xarastore-staging

      - name: Rollback production
        if: needs.deploy-production.result == 'failure'
        run: |
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" > $HOME/.kube/config
          kubectl rollout undo deployment/xarastore-app --namespace=xarastore-production

      - name: Send rollback notification
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#alerts'
          text: "Deployment failed and has been rolled back"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
