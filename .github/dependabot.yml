xarastore/.github/dependabot.yml
version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Africa/Nairobi"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore"
      include: "scope"
    reviewers:
      - "security-team"
    assignees:
      - "devops"
    ignore:
      - dependency-name: "typescript"
        versions: ["5.x"]
      - dependency-name: "next"
        versions: ["14.x"]
      - dependency-name: "react"
        versions: ["18.x"]
      - dependency-name: "react-dom"
        versions: ["18.x"]
    groups:
      production-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: "development"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Docker dependencies
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "Africa/Nairobi"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore"
      include: "scope"
    reviewers:
      - "devops"
    assignees:
      - "devops"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
      timezone: "Africa/Nairobi"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"
    reviewers:
      - "devops"
    assignees:
      - "devops"

  # Kubernetes manifests
  - package-ecosystem: "kubernetes"
    directory: "/kubernetes"
    schedule:
      interval: "monthly"
      day: "first monday"
      time: "09:00"
      timezone: "Africa/Nairobi"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "kubernetes"
    commit-message:
      prefix: "chore"
      include: "scope"
    reviewers:
      - "devops"
    assignees:
      - "devops"

  # Security updates (critical)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 20
    labels:
      - "security"
      - "dependencies"
    commit-message:
      prefix: "security"
      include: "scope"
    reviewers:
      - "security-team"
    assignees:
      - "security-team"
    groups:
      security-updates:
        patterns:
          - "*"
        update-types:
          - "security"

  # Production hotfixes
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    labels:
      - "hotfix"
      - "dependencies"
    commit-message:
      prefix: "fix"
      include: "scope"
    reviewers:
      - "security-team"
      - "devops"
    assignees:
      - "devops"
    versioning-strategy: "lockfile-only"

  # Development dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "09:00"
      timezone: "Africa/Nairobi"
    open-pull-requests-limit: 15
    labels:
      - "dependencies"
      - "development"
    commit-message:
      prefix: "chore"
      include: "scope"
    reviewers:
      - "development-team"
    assignees:
      - "development-team"
    ignore:
      - dependency-name: "@types/*"
    groups:
      types-packages:
        patterns:
          - "@types/*"

  # Docker compose files
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker-compose"
    commit-message:
      prefix: "chore"
      include: "scope"
    reviewers:
      - "devops"
    assignees:
      - "devops"

  # Monitoring stack
  - package-ecosystem: "docker"
    directory: "/monitoring"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "monitoring"
    commit-message:
      prefix: "chore"
      include: "scope"
    reviewers:
      - "devops"
    assignees:
      - "devops"

registries:
  npm-registry:
    type: npm-registry
    url: https://registry.npmjs.org
    token: ${{secrets.NPM_TOKEN}}
  dockerhub:
    type: docker-registry
    url: https://index.docker.io
    username: ${{secrets.DOCKER_USERNAME}}
    password: ${{secrets.DOCKER_PASSWORD}}
  github-container-registry:
    type: docker-registry
    url: https://ghcr.io
    username: ${{github.actor}}
    password: ${{secrets.GITHUB_TOKEN}}
