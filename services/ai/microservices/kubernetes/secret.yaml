apiVersion: v1
kind: Secret
metadata:
  name: supabase-credentials
  namespace: xarastore-ai
type: Opaque
data:
  supabase_url: <base64-encoded-supabase-url>
  service_role_key: <base64-encoded-service-role-key>
  anon_key: <base64-encoded-anon-key>
---
apiVersion: v1
kind: Secret
metadata:
  name: ml-api-keys
  namespace: xarastore-ai
type: Opaque
data:
  openai_api_key: <base64-encoded-openai-key>
  huggingface_token: <base64-encoded-hf-token>
