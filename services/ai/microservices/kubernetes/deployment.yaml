apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-recommendations
  namespace: xarastore-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-recommendations
  template:
    metadata:
      labels:
        app: ai-recommendations
    spec:
      containers:
      - name: recommendations
        image: xarastore/ai-recommendations:latest
        ports:
        - containerPort: 8001
        env:
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: ai-config
              key: redis_url
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: supabase-credentials
              key: supabase_url
        - name: SUPABASE_SERVICE_ROLE_KEY
          valueFrom:
            secretKeyRef:
              name: supabase-credentials
              key: service_role_key
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-recommendations-service
  namespace: xarastore-ai
spec:
  selector:
    app: ai-recommendations
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP
