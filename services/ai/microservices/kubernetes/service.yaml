apiVersion: v1
kind: Service
metadata:
  name: ai-services
  namespace: xarastore-ai
spec:
  selector:
    app: ai-services
  ports:
  - name: recommendations
    port: 8001
    targetPort: 8001
  - name: search-relevance
    port: 8002
    targetPort: 8002
  - name: pricing
    port: 8003
    targetPort: 8003
  - name: fraud-detection
    port: 8004
    targetPort: 8004
  - name: image-recognition
    port: 8005
    targetPort: 8005
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-services-ingress
  namespace: xarastore-ai
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - ai.xarastore.com
    secretName: ai-services-tls
  rules:
  - host: ai.xarastore.com
    http:
      paths:
      - path: /api/v1/recommendations
        pathType: Prefix
        backend:
          service:
            name: ai-recommendations-service
            port:
              number: 8001
      - path: /api/v1/search/relevance
        pathType: Prefix
        backend:
          service:
            name: ai-search-relevance-service
            port:
              number: 8002
      - path: /api/v1/pricing
        pathType: Prefix
        backend:
          service:
            name: ai-pricing-service
            port:
              number: 8003
      - path: /api/v1/fraud
        pathType: Prefix
        backend:
          service:
            name: ai-fraud-detection-service
            port:
              number: 8004
      - path: /api/v1/vision
        pathType: Prefix
        backend:
          service:
            name: ai-image-recognition-service
            port:
              number: 8005
