events {
    worker_connections 1024;
}

http {
    upstream ai_services {
        least_conn;
        server recommendations:8001;
        server search-relevance:8002;
        server pricing:8003;
        server fraud-detection:8004;
        server image-recognition:8005;
    }

    server {
        listen 8000;
        server_name ai.xarastore.com;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Rate limiting
        limit_req_zone $binary_remote_addr zone=ai_services:10m rate=100r/s;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Recommendations API
        location /api/v1/recommendations {
            limit_req zone=ai_services burst=20 nodelay;
            proxy_pass http://recommendations:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Search relevance API
        location /api/v1/search/relevance {
            limit_req zone=ai_services burst=20 nodelay;
            proxy_pass http://search-relevance:8002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Pricing API
        location /api/v1/pricing {
            limit_req zone=ai_services burst=10 nodelay;
            proxy_pass http://pricing:8003;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Fraud detection API
        location /api/v1/fraud {
            limit_req zone=ai_services burst=10 nodelay;
            proxy_pass http://fraud-detection:8004;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Image recognition API
        location /api/v1/vision {
            limit_req zone=ai_services burst=5 nodelay;
            client_max_body_size 10M;
            proxy_pass http://image-recognition:8005;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Longer timeout for image processing
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Default catch-all
        location / {
            return 404;
        }
    }
}
