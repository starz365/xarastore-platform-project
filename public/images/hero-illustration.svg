<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="gradient-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    
    <linearGradient id="gradient-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fecaca"/>
      <stop offset="100%" stop-color="#fca5a5"/>
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#dc2626" flood-opacity="0.2"/>
    </filter>
    
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.8; }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .float { animation: float 6s ease-in-out infinite; }
      .pulse { animation: pulse 4s ease-in-out infinite; }
      .spin { animation: spin 20s linear infinite; }
    </style>
  </defs>
  
  <!-- Background circle with subtle animation -->
  <circle cx="400" cy="300" r="250" fill="url(#gradient-light)" opacity="0.1" class="float"/>
  
  <!-- Main shopping cart/bag icon -->
  <g transform="translate(400, 300)" filter="url(#shadow)">
    <!-- Cart body -->
    <path d="M-80,-40 Q-80,-80 -40,-80 H40 Q80,-80 80,-40 V80 Q80,120 40,120 H-40 Q-80,120 -80,80 Z" 
          fill="url(#gradient-red)" class="pulse"/>
    
    <!-- Cart handle -->
    <path d="M-50,-80 C-50,-100 -30,-120 0,-120 S50,-100 50,-80" 
          stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Shopping bag details -->
    <rect x="-60" y="-30" width="120" height="60" rx="8" fill="#ffffff" opacity="0.9"/>
    
    <!-- Price tag inside cart -->
    <g transform="translate(0, 0)" class="float" style="animation-delay: 0.5s">
      <rect x="-30" y="10" width="60" height="25" rx="4" fill="#ffffff"/>
      <text x="0" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
            font-size="12" font-weight="bold" fill="#dc2626">KES</text>
      <text x="0" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
            font-size="16" font-weight="bold" fill="#dc2626">2,499</text>
    </g>
  </g>
  
  <!-- Floating product icons around the cart -->
  <g class="float" style="animation-delay: 1s">
    <circle cx="200" cy="150" r="40" fill="#ffffff" filter="url(#shadow)" opacity="0.9">
      <animate attributeName="r" values="40;42;40" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Smartphone icon -->
    <g transform="translate(200, 150)">
      <rect x="-15" y="-25" width="30" height="50" rx="4" fill="#dc2626"/>
      <rect x="-12" y="-22" width="24" height="44" rx="2" fill="#ffffff"/>
      <circle cx="0" cy="-15" r="2" fill="#dc2626"/>
      <rect x="-4" y="18" width="8" height="2" rx="1" fill="#dc2626"/>
    </g>
    
    <!-- Deal badge -->
    <circle cx="230" cy="120" r="15" fill="#dc2626" filter="url(#glow-strong)">
      <animate attributeName="fill" values="#dc2626;#ef4444;#dc2626" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="230" y="120" text-anchor="middle" dy="0.3em" font-family="system-ui, -apple-system, sans-serif" 
          font-size="10" font-weight="bold" fill="white">-30%</text>
  </g>
  
  <g class="float" style="animation-delay: 2s">
    <circle cx="600" cy="200" r="35" fill="#ffffff" filter="url(#shadow)" opacity="0.9">
      <animate attributeName="r" values="35;37;35" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Headphones icon -->
    <g transform="translate(600, 200)">
      <circle cx="-20" cy="0" r="25" fill="#dc2626" opacity="0.8"/>
      <circle cx="20" cy="0" r="25" fill="#dc2626" opacity="0.8"/>
      <path d="M-20,0 C-20,-30 20,-30 20,0" stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round"/>
    </g>
  </g>
  
  <g class="float" style="animation-delay: 3s">
    <circle cx="250" cy="450" r="30" fill="#ffffff" filter="url(#shadow)" opacity="0.9">
      <animate attributeName="r" values="30;32;30" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Running shoe icon -->
    <g transform="translate(250, 450)" style="transform: rotate(-15deg);">
      <path d="M-25,-10 Q-20,-20 -10,-20 H20 Q30,-20 30,-10 V15 Q30,25 20,25 H-10 Q-20,25 -25,15 Z" 
            fill="#dc2626"/>
      <ellipse cx="5" cy="5" rx="12" ry="8" fill="#ffffff" opacity="0.8"/>
    </g>
  </g>
  
  <!-- Xarastore branding -->
  <g transform="translate(400, 500)">
    <!-- Logo background -->
    <rect x="-50" y="-25" width="100" height="50" rx="12" fill="#dc2626" filter="url(#shadow)"/>
    
    <!-- X letter -->
    <g fill="white">
      <rect x="-35" y="-15" width="70" height="30" rx="6" opacity="0.1"/>
      <path d="M-20,-10 L20,10 M-20,10 L20,-10" stroke="white" stroke-width="6" stroke-linecap="round"/>
    </g>
    
    <!-- Brand name -->
    <text x="0" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
          font-size="18" font-weight="bold" fill="#1f2937">Xarastore</text>
    <text x="0" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" 
          font-size="14" fill="#dc2626" font-weight="500">it's a deal</text>
  </g>
  
  <!-- Animated stars representing customer satisfaction -->
  <g fill="#dc2626" opacity="0.6">
    <g class="spin" transform="translate(100, 100)">
      <path d="M0,-8 L3,3 L8,3 L4,8 L5,15 L0,11 L-5,15 L-4,8 L-8,3 L-3,3 Z"/>
    </g>
    
    <g class="spin" style="animation-delay: -5s; animation-duration: 15s" transform="translate(700, 100)">
      <path d="M0,-6 L2,2 L6,2 L3,6 L4,12 L0,9 L-4,12 L-3,6 L-6,2 L-2,2 Z"/>
    </g>
    
    <g class="spin" style="animation-delay: -10s; animation-duration: 25s" transform="translate(150, 500)">
      <path d="M0,-4 L1,1 L3,1 L2,3 L2,6 L0,4 L-2,6 L-2,3 L-3,1 L-1,1 Z"/>
    </g>
  </g>
  
  <!-- Connection lines between elements -->
  <g stroke="#dc2626" stroke-width="1.5" stroke-opacity="0.15" stroke-dasharray="5,5" fill="none">
    <path d="M400,300 Q300,250 200,150"/>
    <path d="M400,300 Q500,250 600,200"/>
    <path d="M400,300 Q325,375 250,450"/>
    
    <!-- Animated dash offset -->
    <animate attributeName="stroke-dashoffset" from="0" to="20" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Trust indicators floating -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#374151" text-anchor="middle">
    <g transform="translate(100, 250)" opacity="0.8">
      <circle cx="0" cy="0" r="20" fill="#10b981" opacity="0.1"/>
      <text x="0" y="-8" font-weight="bold">✓</text>
      <text x="0" y="10" font-weight="500">Verified</text>
    </g>
    
    <g transform="translate(700, 400)" opacity="0.8">
      <circle cx="0" cy="0" r="20" fill="#3b82f6" opacity="0.1"/>
      <text x="0" y="-8" font-weight="bold">🚚</text>
      <text x="0" y="10" font-weight="500">Free</text>
      <text x="0" y="20" font-weight="500">Delivery</text>
    </g>
    
    <g transform="translate(100, 400)" opacity="0.8">
      <circle cx="0" cy="0" r="20" fill="#8b5cf6" opacity="0.1"/>
      <text x="0" y="-8" font-weight="bold">🔒</text>
      <text x="0" y="10" font-weight="500">Secure</text>
      <text x="0" y="20" font-weight="500">Pay</text>
    </g>
  </g>
</svg>
