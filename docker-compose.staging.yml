version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.staging
      args:
        NODE_ENV: staging
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
    image: xarastore/staging:${BUILD_NUMBER:-latest}
    container_name: xarastore-staging-app
    ports:
      - "8080:3000"
    environment:
      - NODE_ENV=staging
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - MPESA_CONSUMER_KEY=${MPESA_CONSUMER_KEY}
      - MPESA_CONSUMER_SECRET=${MPESA_CONSUMER_SECRET}
      - MPESA_SHORT_CODE=${MPESA_SHORT_CODE}
      - MPESA_PASSKEY=${MPESA_PASSKEY}
      - REDIS_URL=redis://redis:6379
    volumes:
      - /app/node_modules
      - /app/.next
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - xarastore-staging

  redis:
    image: redis:7-alpine
    container_name: xarastore-staging-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-staging-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-xarastore-staging}
    restart: unless-stopped
    networks:
      - xarastore-staging

  nginx:
    image: nginx:alpine
    container_name: xarastore-staging-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.staging.conf:/etc/nginx/nginx.conf
      - ./public:/usr/share/nginx/html
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - xarastore-staging

  watchtower:
    image: containrrr/watchtower
    container_name: xarastore-staging-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 --label-enable --cleanup
    restart: unless-stopped
    networks:
      - xarastore-staging

volumes:
  redis-staging-data:

networks:
  xarastore-staging:
    driver: bridge
