version: '3.8'

services:
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
      args:
        NODE_ENV: test
    environment:
      - NODE_ENV=test
      - NEXT_PUBLIC_SUPABASE_URL=http://mock-supabase:54321
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=test_anon_key
      - SUPABASE_SERVICE_ROLE_KEY=test_service_role_key
      - DATABASE_URL=postgresql://xarastore:xarastore_test@postgres-test:5432/xarastore_test
      - REDIS_URL=redis://redis-test:6379
      - JEST_JUNIT_OUTPUT_DIR=./test-results
    volumes:
      - ./test-results:/app/test-results
    command: >
      sh -c "npm run test:ci"
    depends_on:
      - redis-test
      - postgres-test
      - mock-supabase
    networks:
      - xarastore-test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis-test:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-test-data:/data
    networks:
      - xarastore-test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres-test:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=xarastore_test
      - POSTGRES_USER=xarastore
      - POSTGRES_PASSWORD=xarastore_test
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
      - ./supabase/migrations.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - xarastore-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xarastore"]
      interval: 30s
      timeout: 10s
      retries: 5

  mock-supabase:
    image: supabase/postgres:15.1.0.41
    environment:
      - POSTGRES_PASSWORD=postgres
      - JWT_SECRET=test_jwt_secret
      - ANON_KEY=test_anon_key
      - SERVICE_ROLE_KEY=test_service_role_key
    ports:
      - "54321:5432"
    volumes:
      - ./supabase/migrations.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - xarastore-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5

  playwright:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    environment:
      - CI=true
      - NODE_ENV=test
      - NEXT_PUBLIC_SUPABASE_URL=http://mock-supabase:54321
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=test_anon_key
    volumes:
      - ./playwright-report:/app/playwright-report
      - ./test-results:/app/test-results
    command: npm run test:e2e
    depends_on:
      - test
    networks:
      - xarastore-test

volumes:
  redis-test-data:
  postgres-test-data:

networks:
  xarastore-test:
    driver: bridge
