<system>
  workers 2
  root_dir /var/log/fluent
  log_level info
</system>

<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

<source>
  @type http
  port 9880
  bind 0.0.0.0
  body_size_limit 32m
  keepalive_timeout 10s
</source>

<source>
  @type tail
  @id in_tail_container_logs
  path /var/log/containers/*.log
  pos_file /var/log/fluentd-containers.log.pos
  tag kubernetes.*
  read_from_head true
  <parse>
    @type json
    time_format %Y-%m-%dT%H:%M:%S.%NZ
    keep_time_key true
  </parse>
</source>

<filter kubernetes.**>
  @type kubernetes_metadata
  @id filter_kube_metadata
  skip_labels false
  skip_container_metadata false
  skip_master_url true
  skip_namespace_metadata false
</filter>

<filter **>
  @type record_transformer
  enable_ruby true
  <record>
    hostname "#{Socket.gethostname}"
    service_name "${record['kubernetes']['container_name']}"
    namespace "${record['kubernetes']['namespace_name']}"
    pod_name "${record['kubernetes']['pod_name']}"
    container_name "${record['kubernetes']['container_name']}"
  </record>
</filter>

# Application logs
<match kubernetes.var.log.containers.xarastore-**>
  @type copy
  <store>
    @type elasticsearch
    host elasticsearch.xarastore-production.svc.cluster.local
    port 9200
    logstash_format true
    logstash_prefix xarastore-app
    include_tag_key true
    type_name _doc
    tag_key @log_name
    flush_interval 1s
    request_timeout 30s
    reconnect_on_error true
    reload_on_failure true
    reload_connections false
    <buffer>
      @type file
      path /var/log/fluentd-buffers/xarastore-app.buffer
      flush_mode interval
      retry_type exponential_backoff
      flush_thread_count 2
      flush_interval 5s
      retry_forever true
      retry_max_interval 30
      chunk_limit_size 2M
      queue_limit_length 32
      overflow_action block
    </buffer>
  </store>
  
  <store>
    @type s3
    s3_bucket xarastore-logs
    s3_region af-south-1
    path logs/app/
    store_as gzip
    <buffer>
      @type file
      path /var/log/fluentd-buffers/s3.buffer
      timekey 3600
      timekey_wait 10m
      timekey_use_utc true
      chunk_limit_size 256m
    </buffer>
    <format>
      @type json
    </format>
  </store>
</match>

# Error logs
<match kubernetes.var.log.containers.xarastore-**.error>
  @type copy
  <store>
    @type slack
    webhook_url ${SLACK_WEBHOOK_URL}
    channel alerts
    username Fluentd
    icon_emoji :warning:
    flush_interval 10s
    message_keys log,message
    title_keys pod_name,namespace
    title "Error in %s/%s"
    <format>
      @type json
    </format>
  </store>
  
  <store>
    @type elasticsearch
    host elasticsearch.xarastore-production.svc.cluster.local
    port 9200
    logstash_format true
    logstash_prefix xarastore-error
    include_tag_key true
    type_name _doc
    tag_key @log_name
  </store>
</match>

# Access logs
<match kubernetes.var.log.containers.xarastore-**.access>
  @type elasticsearch
  host elasticsearch.xarastore-production.svc.cluster.local
  port 9200
  logstash_format true
  logstash_prefix xarastore-access
  include_tag_key true
  type_name _doc
  tag_key @log_name
</match>

# Payment logs (sensitive - additional security)
<match kubernetes.var.log.containers.xarastore-**.payment>
  @type copy
  <store>
    @type elasticsearch
    host elasticsearch-secure.xarastore-production.svc.cluster.local
    port 9200
    logstash_format true
    logstash_prefix xarastore-payment
    include_tag_key true
    type_name _doc
    tag_key @log_name
    ssl_verify false
    ssl_version TLSv1_2
    <auth>
      method basic
      username ${ELASTICSEARCH_USERNAME}
      password ${ELASTICSEARCH_PASSWORD}
    </auth>
  </store>
  
  <store>
    @type s3
    s3_bucket xarastore-payment-logs
    s3_region af-south-1
    path logs/payment/
    store_as gzip
    sse_customer_algorithm AES256
    sse_customer_key ${S3_ENCRYPTION_KEY}
    <buffer>
      @type file
      path /var/log/fluentd-buffers/payment-s3.buffer
      timekey 3600
      timekey_wait 10m
      timekey_use_utc true
      chunk_limit_size 256m
    </buffer>
  </store>
</match>

# Audit logs
<match kubernetes.var.log.containers.xarastore-**.audit>
  @type copy
  <store>
    @type elasticsearch
    host elasticsearch-secure.xarastore-production.svc.cluster.local
    port 9200
    logstash_format true
    logstash_prefix xarastore-audit
    include_tag_key true
    type_name _doc
    tag_key @log_name
  </store>
  
  <store>
    @type file
    path /var/log/xarastore/audit/audit.log
    append true
    <format>
      @type json
    </format>
    <buffer>
      @type file
      path /var/log/fluentd-buffers/audit-file.buffer
      flush_mode interval
      flush_interval 1s
    </buffer>
  </store>
</match>

# System logs
<match kubernetes.var.log.containers.kube-system-**>
  @type elasticsearch
  host elasticsearch.xarastore-production.svc.cluster.local
  port 9200
  logstash_format true
  logstash_prefix kube-system
  include_tag_key true
  type_name _doc
  tag_key @log_name
</match>

# Metrics logs
<match kubernetes.var.log.containers.prometheus-**>
  @type elasticsearch
  host elasticsearch.xarastore-production.svc.cluster.local
  port 9200
  logstash_format true
  logstash_prefix prometheus
  include_tag_key true
  type_name _doc
  tag_key @log_name
</match>

# Performance metrics
<filter kubernetes.var.log.containers.xarastore-**>
  @type prometheus
  <metric>
    name application_log_total
    type counter
    desc Total number of application logs
    <labels>
      level ${record["level"]}
      service ${record["service_name"]}
      namespace ${record["namespace"]}
    </labels>
  </metric>
  
  <metric>
    name application_error_total
    type counter
    desc Total number of application errors
    <labels>
      service ${record["service_name"]}
      namespace ${record["namespace"]}
      error_type ${record["error_type"]}
    </labels>
  </metric>
  
  <metric>
    name application_latency_seconds
    type histogram
    desc Application request latency
    key latency
    <labels>
      service ${record["service_name"]}
      endpoint ${record["endpoint"]}
    </labels>
    buckets [0.1, 0.5, 1, 2.5, 5, 10]
  </metric>
</filter>

# Log enrichment for business metrics
<filter kubernetes.var.log.containers.xarastore-**>
  @type record_transformer
  enable_ruby true
  <record>
    business_metrics {
      "order_value": ${record["amount"] ? record["amount"].to_f : 0},
      "customer_id": ${record["customer_id"] ? record["customer_id"] : "anonymous"},
      "payment_method": ${record["payment_method"] ? record["payment_method"] : "unknown"},
      "country": ${record["geoip"] && record["geoip"]["country_code"] ? record["geoip"]["country_code"] : "unknown"}
    }
  </record>
</filter>

# GeoIP enrichment
<filter kubernetes.var.log.containers.xarastore-**>
  @type geoip
  geoip_lookup_keys ip
  <record>
    geoip {
      "city": "${city['ip']}",
      "country_code": "${country_code['ip']}",
      "latitude": "${latitude['ip']}",
      "longitude": "${longitude['ip']}"
    }
  </record>
  flush_interval 1s
</filter>

# Anomaly detection
<filter kubernetes.var.log.containers.xarastore-**>
  @type anomaly_detector
  model_file /etc/fluentd/models/anomaly.model
  sample_size 1000
  threshold 3.0
  <storage>
    @type local
    persistent true
    path /var/log/fluentd/anomaly-storage
  </storage>
</filter>

# All other logs
<match **>
  @type elasticsearch
  host elasticsearch.xarastore-production.svc.cluster.local
  port 9200
  logstash_format true
  logstash_prefix other
  include_tag_key true
  type_name _doc
  tag_key @log_name
  flush_interval 5s
</match>
